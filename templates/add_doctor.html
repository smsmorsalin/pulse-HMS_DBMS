<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add doctor</title>
</head>
<body>
    <h1>Add Doctor</h1>
    <form action="{{ url_for('add_doctor') }}" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="phone">Phone:</label>
        <input type="text" id="phone" name="phone" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="specialization">Specialization:</label>
        <input type="text" id="specialization" name="specialization" required><br><br>

        <label for="department">Department:</label>
        <input type="text" id="department" name="department" required><br><br>

        <label for="license_number">License Number:</label>
        <input type="text" id="license_number" name="license_number" required><br><br>

        <label for="availability">Availability:</label>
        <input type="text" id="availability" name="availability" required><br><br>

        <label for="experience">Experience (years):</label>
        <input type="number" id="experience" name="experience" required><br><br>

        <label for="room_number">Room Number:</label>
        <input type="text" id="room_number" name="room_number" required><br><br>

        <button type="submit">Add Doctor</button>
    </form>
</body>
</html>
