<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Desk</title>
</head>
<body>
    <a href="{{ url_for('patient') }}">+ New Patient</a>

    <h2>Service Desk - Search Patient</h2>

    <form method="POST">
        <input type="text" name="keyword" placeholder="Search by name or phone">
        <button type="submit">Search</button>
    </form>

    <table border="1">
    <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Action</th>
    </tr>

    {% for p in patients %}
    <tr>
        <td>{{ p[1] }}</td>
        <td>{{ p[4] }}</td>
        <td>
            <a href="/patient_service/{{ p[0] }}">
                Select
            </a>
        </td>
    </tr>
    {% endfor %}
    </table>
</body>
</html>
