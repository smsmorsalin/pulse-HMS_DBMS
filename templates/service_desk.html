<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Desk</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/service_desk.css') }}">
</head>
<body>
    <div class="background-blobs"></div>

    <main class="service-desk-page">
        <section class="service-desk-panel">
            <div class="service-desk-header">
                <a class="back-btn" href="{{ url_for('dashboard') }}" aria-label="Back to dashboard">
                    <i class="fas fa-arrow-left"></i>
                    Back
                </a>

                <div>
                    <h1><i class="fas fa-headset"></i> Service Desk</h1>
                    <p>Search and manage patient services.</p>
                </div>

                <div class="header-actions">
                    <a class="new-patient-btn" href="{{ url_for('patient') }}">
                        <i class="fas fa-plus"></i>
                        New Patients
                    </a>
                </div>
            </div>

            {% if message %}
                <p class="flash-message">{{ message }}</p>
            {% endif %}

            <div class="search-section">
                <div class="search-form">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="serviceDeskSearchInput" placeholder="Search by name or phone" class="search-input">
                    </div>
                    <button type="button" id="serviceDeskSearchClearBtn" class="search-btn">Clear</button>
                </div>
            </div>

            <div class="service-desk-table">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="serviceDeskTableBody">
                        {% if patients %}
                            {% for p in patients %}
                            <tr>
                                <td>{{ p[1] }}</td>
                                <td>{{ p[4] }}</td>
                                <td>
                                    <a href="/patient_service/{{ p[0] }}" class="select-link">
                                        <i class="fas fa-arrow-right"></i> Select
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        {% else %}
                            <tr>
                                <td colspan="3">No patients found.</td>
                            </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const serviceDeskSearchInput = document.getElementById("serviceDeskSearchInput");
        const serviceDeskSearchClearBtn = document.getElementById("serviceDeskSearchClearBtn");
        const serviceDeskTableBody = document.getElementById("serviceDeskTableBody");

        // Real-time search as you type
        serviceDeskSearchInput.addEventListener("input", function () {
            const searchTerm = this.value.trim().toLowerCase();
            const rows = serviceDeskTableBody.querySelectorAll("tr");

            rows.forEach(function (row) {
                const nameCell = row.cells[0];
                const phoneCell = row.cells[1];

                if (!nameCell || !phoneCell) {
                    row.style.display = "";
                    return;
                }

                const nameText = nameCell.textContent.toLowerCase();
                const phoneText = phoneCell.textContent.toLowerCase();
                const isMatch = nameText.includes(searchTerm) || phoneText.includes(searchTerm);
                row.style.display = isMatch ? "" : "none";
            });
        });

        // Clear button functionality
        serviceDeskSearchClearBtn.addEventListener("click", function () {
            serviceDeskSearchInput.value = "";
            serviceDeskTableBody.querySelectorAll("tr").forEach(function (row) {
                row.style.display = "";
            });
        });
    </script>
</body>
</html>
