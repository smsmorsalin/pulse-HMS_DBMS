<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services</title>
</head>
<body>
    {% if admin %}
    <a href="{{ url_for('add_service') }}">Add New Service</a>
    {% endif %}
    
    {% if message %}
        <p>{{ message }}</p>
    {% endif %}
    <h2>All Services</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Price</th>
        {% if admin %}
        <th>Actions</th>
        {% endif %}
    </tr>

    {% for s in services %}
    <tr>
        <td>{{ s[1] }}</td>
        <td>{{ s[2] }}</td>
        <td>{{ s[3] }}</td>

        {% if admin %}
        <td>
            <a href="/edit_service/{{ s[0] }}">Edit</a>
            <a href="/delete_service/{{ s[0] }}">Delete</a>
        </td>
        {% endif %}
    </tr>
    {% endfor %}
</table>

</body>
</html>
