<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='services.css') }}?v=2">
    <title>Services</title>
</head>
<body>
    <div class="background-blobs"></div>

    <main class="services-wrapper">
        <section class="services-card">
            <div class="services-header">
                <div class="title-with-back">
                    <a href="{{ url_for('admin_portal') }}" class="back-btn" aria-label="Back to admin portal">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h2>All Services</h2>
                </div>
                {% if admin %}
                <a class="action-btn" href="{{ url_for('add_service') }}">Add New Service</a>
                {% endif %}
            </div>

            {% if message %}
            <p class="flash-message">{{ message }}</p>
            {% endif %}

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Price</th>
                            {% if admin %}
                            <th>Actions</th>
                            {% endif %}
                        </tr>
                    </thead>
                    <tbody>
                        {% for s in services %}
                        <tr>
                            <td>{{ s[1] }}</td>
                            <td>{{ s[2] }}</td>
                            <td>{{ s[3] }}</td>

                            {% if admin %}
                            <td class="actions-cell">
                                <a class="row-action" href="{{ url_for('edit_service', service_id=s[0]) }}">Edit</a>
                                <a class="row-action delete" href="{{ url_for('delete_service', service_id=s[0]) }}">Delete</a>
                            </td>
                            {% endif %}
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </section>
    </main>

</body>
</html>
