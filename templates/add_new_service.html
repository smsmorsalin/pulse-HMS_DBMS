<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/add_new_service.css') }}?v=2">
    <title>Add Service</title>
</head>
<body>
    <div class="background-blobs"></div>

    <main class="services-wrapper">
        <section class="services-card add-service-card">
            <div class="services-header">
                <div class="title-with-back">
                    <a href="{{ url_for('services') }}" class="back-btn" aria-label="Back to services">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h2>Add Service</h2>
                </div>
            </div>

            <form method="POST" class="service-form">
                <label for="name">Service Name</label>
                <input type="text" id="name" name="name" placeholder="Service Name" required>

                <label for="type">Type</label>
                <select id="type" name="type" required>
                    <option value="doctor">Doctor</option>
                    <option value="test">Test</option>
                </select>

                <label for="price">Price</label>
                <input type="text" id="price" name="price" placeholder="Price" required>

                <div class="form-actions">
                    <button type="submit" class="action-btn">Add Service</button>
                </div>
            </form>

            {% if error %}
            <p class="error-message">{{ error }}</p>
            {% endif %}
        </section>
    </main>
</body>
</html>
